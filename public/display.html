<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Display</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
}

.ring {
    font-size: 24px;
    font-weight: bold;
}

.now {
    color: #00ff88;
}

.next {
    color: #ffaa00;
}
</style>
</head>

<body>

<h1>🔴 LIVE MATCH STATUS</h1>
<p id="updateTime"></p>

<div class="grid" id="grid"></div>

<script>
const socket = io();

socket.on("update", (data) => {
    console.log("收到数据:", data);

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach((d) => {
        grid.innerHTML += `
        <div class="card">
            <div class="ring">${d.ring}</div>
            <div class="now">Now: ${d.now}</div>
            <div class="next">Next: ${d.next}</div>
        </div>
        `;
    });

    document.getElementById("updateTime").innerText =
    "Last Updated: " + new Date().toLocaleTimeString();
});
</script>

</body>
</html>
